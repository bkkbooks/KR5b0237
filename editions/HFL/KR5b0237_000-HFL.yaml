front:
  text: 太上靈寳中元地官消愆滅罪懴中爾時元始天尊在九土無極世界廣演大乗敷說道要度脫衆生離諸苦惱咸令安樂是時中元一切道俗男女皆受護度俱享逍遥元始天尊復告中元地官及諸聖衆自今已後天下若有人民不安三災競起五毒興行盜賊侵陵枉遭塗炭人民失業眷屬兢惶州縣郷坊田園蕪没生靈餓殍親戚相䟽骨肉分離死亡至甚此是鬼兵魔王災害興行令中元之人受諸苦惱無處存活兩兩相看不能爲計惟宜率斂淨財十家五家同心併力市易香油建置道場䖍請髙行道士明達經典者禮轉中元一百二十天尊名號至心皈命元始真像五老上帝一切仙聖具陳情悃感徹諸天乃遣飛天神王十極真人四直功曹察命察録司功考過俱降道場聽民所願隨念受福收擒爲害凶妖除滅五毒三災降下洪恩保佑皈心庶俗名上中元齋籍玉曆永受玄恩道慈撫育隨意所圖剋皆成就眷屬康泰門昌族貴平安之後更專敬三光崇仰一切靈祇自然獲慶除災請福中元地官及諸聖衆聞天尊演說度人津梁功德無量不可思議是時是男是女莫不稱揚讃歎一切生死報對悉皆消滅幽關重閉並受光明苦爽窮魂隨念往生普勸衆生至心懴禮
