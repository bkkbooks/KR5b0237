body:
  text: 人各恭敬至心朝禮中元真宰天尊至心朝禮髙勝玄通天尊至心朝禮玄元誕妙天尊至心朝禮空慧凝常天尊至心朝禮方便善救天尊至心朝禮通真應變天尊至心朝禮衆善慈施天尊至心朝禮香光忍辱天尊至心朝禮凝神玄覺天尊至心朝禮輪轉運度天尊至心朝禮大慈無我天尊至心朝禮靈通品量天尊至心朝禮運化微明天尊至心朝禮大慧衆善天尊至心朝禮海量無涯天尊至心朝禮光妙髙玄天尊至心朝禮常住虚極天尊至心朝禮玄微德本天尊至心朝禮輝虚度命天尊至心朝禮㑹音開宗天尊至心朝禮貪善樂法天尊至心朝禮妙空真相天尊至心朝禮舍弘品量天尊至心朝禮智藏微達天尊至心朝禮慧解空寂天尊至心朝禮普照幽玄天尊至心朝禮法本虚凝天尊至心朝禮天寳救苦天尊至心朝禮無量自在天尊至心朝禮智成大滿天尊至心朝禮平等善應天尊至心朝禮開光濟物天尊至心朝禮清微澄悟天尊至心朝禮太明空解天尊至心朝禮髙清妙慧天尊至心朝禮開縁普救天尊至心朝禮無量妙身天尊至心朝禮光相萬變天尊至心朝禮紫虚玄聖天尊至心朝禮飛空智聖天尊至心朝禮玉宸曜景天尊至心朝禮梵寳太虚天尊至心朝禮元靈等觀天尊至心朝禮海空辨慧天尊至心朝禮尊勝妙廣天尊至心朝禮善願普音天尊至心朝禮仙靈正行天尊至心朝禮慈施興善天尊至心朝禮威力難思天尊至心朝禮常住慧能天尊至心朝禮真遊本行天尊至心朝禮香林定想天尊至心朝禮無爲普濟天尊至心朝禮保命上生天尊至心朝禮落滅惡根天尊至心朝禮智德無礙天尊至心朝禮平等善救天尊至心朝禮演聖開元天尊至心朝禮延福保神天尊至心朝禮興行妙道天尊至心朝禮金容感應天尊至心朝禮照用國王天尊至心朝禮觀照虚无天尊至心朝禮六通澄悟天尊至心朝禮玄真妙顯天尊至心朝禮分形通德天尊至心朝禮元靈端淨天尊至心朝禮無量大度天尊至心朝禮寳頂大成天尊至心朝禮安演無爲天尊至心朝禮至真幽寂天尊至心朝禮法積光明天尊至心朝禮寳花嚴淨天尊至心朝禮應見常容天尊至心朝禮普照縁感天尊至心朝禮赴應隨縁天尊至心朝禮念度羣生天尊至心朝禮普光勸善天尊至心朝禮入定體常天尊至心朝禮還魂起死天尊至心朝禮妙保上真天尊至心朝禮開明祖劫天尊至心朝禮普植化生天尊至心朝禮長生保命天尊至心朝禮周回度世天尊至心朝禮上極妙容天尊至心朝禮削除罪犯天尊至心朝禮威權自在天尊至心朝禮超淩上界天尊至心朝禮乗神濟物天尊至心朝禮示見萬像天尊至心朝禮還元歸寂天尊至心朝禮安樂保常天尊至心朝禮全生護命天尊至心朝禮示籙保年天尊至心朝禮安鎮含識天尊至心朝禮四靈養性天尊至心朝禮保命受生天尊至心朝禮壽命無窮天尊至心朝禮流演萬範天尊至心朝禮運度八威天尊至心朝禮玄㑹八真天尊至心朝禮普臨萬行天尊至心朝禮延和正化天尊至心朝禮廣運慈善天尊至心朝禮善濟智成天尊至心朝禮建德明和天尊至心朝禮常善救物天尊至心朝禮妙樂無等天尊至心朝禮虚無至道天尊至心朝禮興弘德化天尊至心朝禮敬愛慈忍天尊至心朝禮開濟四生天尊至心朝禮思念三徒天尊至心朝禮弘德廣廕天尊至心朝禮真靜應物天尊至心朝禮變化飛空天尊至心朝禮廣德妙行天尊至心朝禮統乗玄都天尊至心朝禮善證大慧天尊至心朝禮五嶽名山府君聖衆即日至心歸身歸神歸命太上無極大道中元一百二十應感天尊重念某自從累劫以來至于今日所犯抛擲經書破壞漏爛脫落輕慢聖文之罪内外六親眷屬闘爭妄言結惡不解之罪誹謗出家說無神理之罪辜天負地不生慚愧之罪憎怨父母憐惜妻子五逆兄弟之罪借貸人物金銀玉帛寳貨以爲己用之罪買賣孤虚侵損別人自利己身之罪私心計度大斗重秤瞞昧王民方便侵欺之罪假託聖賢匃求功德將財入已受用不爲置造誑妄之罪殺生淫祀之罪如是等罪無量無邊以今發露懴悔並乞消滅伏願中元應感天尊無極聖衆敕下十直神仙天帝使者録其罪目攺作十齋功德上奏天曹當令某所懴罪愆隨聲觧脫並獲消除至心歸命禮無上虚皇正真三寳太上靈寳中元地官消愆滅罪懴中
